<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#059669" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Comparador" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/NVmQbJT.png?v=2">
    <link rel="apple-touch-icon" href="https://i.imgur.com/NVmQbJT.png?v=2">

    <script>
    // Isso cria o "Manifest" digitalmente para o Android reconhecer o ícone
    const manifest = {
      "name": "Meu Comparador de Preços",
      "short_name": "Comparador",
      "start_url": ".",
      "display": "standalone",
      "icons": [
        {
          "src": "https://i.imgur.com/NVmQbJT.png?v=2",
          "sizes": "512x512",
          "type": "image/png",
          "purpose": "any maskable"
        }
      ]
    };
    const stringManifest = JSON.stringify(manifest);
    const blob = new Blob([stringManifest], {type: 'application/json'});
    const manifestURL = URL.createObjectURL(blob);
    document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);
    </script>
    <title>Comparador de Preços Inteligente</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
